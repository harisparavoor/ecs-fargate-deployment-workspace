name: Terraform Plan and Apply (per-environment)

permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - "infrastructure/**"
  pull_request:
    paths:
      - "infrastructure/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  # Detect which environment changed based on the branch and folder changes
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      env: ${{ steps.set-env.outputs.env }}
      path: ${{ steps.set-env.outputs.path }}
      environment_name: ${{ steps.set-env.outputs.environment_name }}
      branch: ${{ steps.set-env.outputs.branch }}
      should_run: ${{ steps.set-env.outputs.should_run }}
      changed_files: ${{ steps.changed-files.outputs.changed_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            infrastructure/environments/**/*.tf
          files_ignore: |
            infrastructure/environments/**/*.tfstate
            infrastructure/environments/**/*.tfstate.backup
            infrastructure/environments/**/.terraform/**
          separator: ","

      - name: Set environment based on branch and changed files
        id: set-env
        run: |
          # For workflow_dispatch with manual environment selection
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
            echo "Manual trigger for environment: $ENV"
          else
            # Determine from branch name
            BRANCH="${{ github.ref_name }}"
            echo "Branch: $BRANCH"
            
            # Map branch to environment
            case "$BRANCH" in
              dev|development)
                ENV="dev"
                ;;
              staging|stage)
                ENV="staging"
                ;;
              main|master|prod|production)
                ENV="prod"
                ;;
              *)
                echo "No matching environment for branch: $BRANCH"
                echo "should_run=false" >> $GITHUB_OUTPUT
                exit 0
                ;;
            esac
          fi

          # Check if the environment folder actually changed
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          ENV_PATH="infrastructure/environments/$ENV"

          echo "Environment: $ENV"
          echo "Environment path: $ENV_PATH"
          echo "Changed files: $CHANGED_FILES"

          # Check if any files in the environment folder changed
          if [[ "$CHANGED_FILES" == *"$ENV_PATH"* ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Changes detected in $ENV_PATH"
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "No changes detected in $ENV_PATH"
            echo "should_run=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Set environment specific variables
          case "$ENV" in
            dev)
              echo "env=dev" >> $GITHUB_OUTPUT
              echo "path=$ENV_PATH" >> $GITHUB_OUTPUT
              echo "environment_name=dev" >> $GITHUB_OUTPUT
              echo "branch=dev" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "env=staging" >> $GITHUB_OUTPUT
              echo "path=$ENV_PATH" >> $GITHUB_OUTPUT
              echo "environment_name=staging" >> $GITHUB_OUTPUT
              echo "branch=staging" >> $GITHUB_OUTPUT
              ;;
            prod)
              echo "env=prod" >> $GITHUB_OUTPUT
              echo "path=$ENV_PATH" >> $GITHUB_OUTPUT
              echo "environment_name=production" >> $GITHUB_OUTPUT
              echo "branch=main" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown environment: $ENV"
              echo "should_run=false" >> $GITHUB_OUTPUT
              exit 1
              ;;
          esac

          echo "Environment: $ENV"
          echo "Paths: $ENV_PATH"

  plan:
    name: Plan - ${{ needs.detect-changes.outputs.env }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.should_run == 'true'
    environment: ${{ needs.detect-changes.outputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Create terraform.tfvars from secret
        shell: bash
        env:
          TF_VARS: ${{ secrets.TF_VARS }}
        run: |
          mkdir -p infrastructure/environments/dev
          printf "%s" "$TF_VARS" > infrastructure/environments/dev/terraform.tfvars
      - name: Format tfvars
        run: terraform fmt infrastructure/environments/dev/terraform.tfvars

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Display environment info
        run: |
          echo "Environment: ${{ needs.detect-changes.outputs.env }}"
          echo "Branch: ${{ needs.detect-changes.outputs.branch }}"
          echo "Path: ${{ needs.detect-changes.outputs.path }}"

      - name: Terraform fmt
        run: terraform fmt -check
        working-directory: ${{ needs.detect-changes.outputs.path }}

      - name: Display fomat check result
        run: |
          echo "fomat check completed successfully "

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ needs.detect-changes.outputs.path }}

      - name: Display init check result
        run: |
          echo "init check completed successfully "

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ needs.detect-changes.outputs.path }}

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan
        working-directory: ${{ needs.detect-changes.outputs.path }}

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ needs.detect-changes.outputs.env }}
          path: ${{ needs.detect-changes.outputs.path }}/tfplan
          retention-days: 1

  apply:
    name: Apply - ${{ needs.detect-changes.outputs.env }}
    runs-on: ubuntu-latest
    needs: [detect-changes, plan]
    if: |
      needs.detect-changes.outputs.should_run == 'true' &&
      github.event_name == 'push' &&
      github.ref_name == needs.detect-changes.outputs.branch
    environment: ${{ needs.detect-changes.outputs.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create terraform.tfvars
        shell: bash
        run: |
          printf '%s' '${{ secrets.TF_VARS }}' > "${{ needs.detect-changes.outputs.path }}/terraform.tfvars"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Display environment info
        run: |
          echo "Environment: ${{ needs.detect-changes.outputs.env }}"
          echo "Branch: ${{ needs.detect-changes.outputs.branch }}"
          echo "Path: ${{ needs.detect-changes.outputs.path }}"

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.detect-changes.outputs.env }}
          path: ${{ needs.detect-changes.outputs.path }}

      - name: Verify plan file
        run: |
          if [ ! -f "tfplan" ]; then
            echo "Plan file not found in $(pwd)"
            ls -la
            exit 1
          fi
        working-directory: ${{ needs.detect-changes.outputs.path }}

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ needs.detect-changes.outputs.path }}

      - name: Terraform apply
        run: terraform apply -input=false tfplan
        working-directory: ${{ needs.detect-changes.outputs.path }}

  # Optional: Comment on PR with plan output
  pr-comment:
    name: PR Comment - ${{ needs.detect-changes.outputs.env }}
    runs-on: ubuntu-latest
    needs: [detect-changes, plan]
    if: |
      needs.detect-changes.outputs.should_run == 'true' &&
      github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ needs.detect-changes.outputs.env }}
          path: ${{ needs.detect-changes.outputs.path }}

      - name: Generate plan output
        id: plan-output
        run: |
          cd ${{ needs.detect-changes.outputs.path }}
          terraform show tfplan -no-color > plan.txt
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          cat plan.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const planOutput = `${{ steps.plan-output.outputs.plan_output }}`;
            const truncated = planOutput.length > 65536 ? planOutput.substring(0, 65536) + '... (truncated)' : planOutput;
            const body = `## Terraform Plan - ${{ needs.detect-changes.outputs.env }}

            **Environment:** ${{ needs.detect-changes.outputs.env }}
            **Branch:** ${{ needs.detect-changes.outputs.branch }}
            **Changed Files:** ${{ needs.detect-changes.outputs.changed_files }}

            \`\`\`hcl
            ${truncated}
            \`\`\`
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
