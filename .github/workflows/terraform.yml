name: Terraform Plan and Apply (per-environment)

permissions:
  contents: read
  id-token: write

on:
  push:
    branches:
      - dev
      - staging
      - main
    paths:
      - "infrastructure/**"
  pull_request:
    paths:
      - "infrastructure/**"
  workflow_dispatch:

jobs:
  plan:
    name: Plan - ${{ matrix.env }}
    runs-on: ubuntu-latest
    environment: ${{ matrix.environment_name }}
    strategy:
      matrix:
        include:
          - env: dev
            path: infrastructure/environments/dev
            environment_name: dev
          - env: staging
            path: infrastructure/environments/staging
            environment_name: staging
          - env: prod
            path: infrastructure/environments/prod
            environment_name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.7"

      - name: Terraform fmt
        run: terraform fmt -check
        working-directory: ${{ matrix.path }}

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ matrix.path }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ matrix.path }}

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan
        working-directory: ${{ matrix.path }}

      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          path: ${{ matrix.path }}/tfplan

  apply:
    name: Apply - ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: plan
    strategy:
      matrix:
        include:
          - env: dev
            path: infrastructure/environments/dev
            branch: refs/heads/dev
            environment_name: dev
          - env: staging
            path: infrastructure/environments/staging
            branch: refs/heads/staging
            environment_name: staging
          - env: prod
            path: infrastructure/environments/prod
            branch: refs/heads/main
            environment_name: production
    if: ${{ github.event_name == 'push' && github.ref_name == matrix.branch }}
    environment: ${{ matrix.environment_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.7"

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}

      - name: Terraform init
        run: terraform init -input=false
        working-directory: ${{ matrix.path }}

      - name: Terraform apply
        run: terraform apply -input=false tfplan
        working-directory: ${{ matrix.path }}
